<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VoteHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }

        .background-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
        }

        .shape1 { width: 300px; height: 300px; background: white; top: -100px; left: -100px; }
        .shape2 { width: 200px; height: 200px; background: white; bottom: -50px; right: -50px; }
        .shape3 { width: 150px; height: 150px; background: white; top: 50%; right: 10%; }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .logo-icon {
            font-size: 50px;
            display: block;
            margin-bottom: 15px;
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }

        .error-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .toast {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-left: 4px solid #667eea;
            animation: slideInRight 0.3s ease-out;
            margin-bottom: 10px;
            min-width: 300px;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(300px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.error {
            border-left-color: #e74c3c;
        }

        .toast.success {
            border-left-color: #27ae60;
        }

        .debug-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            border-left: 3px solid #667eea;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px;
            }
            .login-header h1 {
                font-size: 24px;
            }
            .logo-icon {
                font-size: 40px;
            }
            .toast {
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">🛡️</div>
                <h1>VoteHub Admin</h1>
                <p>Secure Election Management</p>
            </div>

            <form id="adminLoginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input 
                            type="email" 
                            id="adminEmail" 
                            placeholder="admin@votehub.com"
                            value="admin@votehub.com"
                            required
                        >
                    </div>
                    <div class="error-text" id="emailError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input 
                            type="password" 
                            id="adminPassword" 
                            placeholder="admin123"
                            value="admin123"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            👁️
                        </button>
                    </div>
                    <div class="error-text" id="passwordError"></div>
                </div>

                <!-- Submit -->
                <button type="submit" class="login-btn">Login to Admin Panel</button>

                <div class="loading-spinner" id="loadingSpinner"></div>

                <div class="error-text" id="generalError" style="text-align: center; margin-top: 15px; display: none;"></div>

                <!-- Debug Info -->
                <div class="debug-info">
                    <strong>🧪 Test Credentials:</strong><br>
                    Email: admin@votehub.com<br>
                    Password: admin123<br><br>
                    <strong>🔗 API:</strong> http://localhost:5000
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script>
        const API_URL = window.ADMIN_API_URL || 'http://localhost:5000';

        function togglePassword() {
            const input = document.getElementById('adminPassword');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            console.log('='.repeat(50));
            console.log('🔐 LOGIN ATTEMPT');
            console.log('Email:', email);
            console.log('Password:', password);
            console.log('API URL:', API_URL);
            console.log('='.repeat(50));

            // Clear errors
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('generalError').textContent = '';
            document.getElementById('generalError').style.display = 'none';

            // Show loading
            document.getElementById('adminLoginForm').style.opacity = '0.5';
            document.getElementById('adminLoginForm').style.pointerEvents = 'none';
            document.getElementById('loadingSpinner').style.display = 'block';

            try {
                console.log('📤 Sending request to:', `${API_URL}/api/admin/login`);

                const response = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                console.log('📥 Response status:', response.status);

                const data = await response.json();
                console.log('📦 Response data:', data);

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                if (!data.success) {
                    throw new Error(data.message || 'Login failed');
                }

                console.log('✅ Login successful!');
                console.log('Token:', data.token.substring(0, 20) + '...');

                // Store token
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminUser', JSON.stringify(data.admin));

                showToast('✅ Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('❌ ERROR:', error);
                document.getElementById('generalError').textContent = `❌ ${error.message}`;
                document.getElementById('generalError').style.display = 'block';
                showToast(`❌ ${error.message}`, 'error');
            } finally {
                document.getElementById('adminLoginForm').style.opacity = '1';
                document.getElementById('adminLoginForm').style.pointerEvents = 'auto';
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        });

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Log startup
        console.log('🚀 Login page loaded');
        console.log('API URL:', API_URL);
    </script>
</body>
</html>
